version: '3.8'

services:
  # Base de Datos MariaDB
  mariadb:
    image: mariadb:latest
    container_name: database_manager_db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-database_manager}
      MYSQL_USER: ${DB_USER:-manager}
      MYSQL_PASSWORD: ${DB_PASSWORD:-manager123}
    volumes:
      - db_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: database_manager_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DB_HOST: mariadb
      DB_USER: ${DB_USER:-manager}
      DB_PASSWORD: ${DB_PASSWORD:-manager123}
      DB_NAME: ${DB_NAME:-database_manager}
      DB_PORT: 3306
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_DEBUG: ${API_DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      LOG_LEVEL: INFO
    volumes:
      - ./backend:/app/backend
      - ./web:/app/web
      - backend_logs:/app/backend/logs
      - qr_codes:/app/backend/qr_codes
      - uploads:/app/backend/uploads
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - app_network
    command: python main.py

  # Frontend Web (opcional, servido desde backend)
  # Si necesitas Nginx en frente:
  nginx:
    image: nginx:alpine
    container_name: database_manager_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - app_network

volumes:
  db_data:
    driver: local
  backend_logs:
    driver: local
  qr_codes:
    driver: local
  uploads:
    driver: local

networks:
  app_network:
    driver: bridge
