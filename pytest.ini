[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
filterwarnings =
	ignore:.*asyncio\.iscoroutinefunction.*:DeprecationWarning
	ignore:.*default datetime adapter is deprecated.*:DeprecationWarning
	ignore:.*default date adapter is deprecated.*:DeprecationWarning
	ignore:.*datetime\.datetime\.utcnow\(\) is deprecated.*:DeprecationWarning:openpyxl\..*
